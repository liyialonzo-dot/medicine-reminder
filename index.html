<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>李昳的吃药提醒</title>
  <style>
    :root {
      --bg: #f7f3ee;
      --ink: #2f2a25;
      --muted: #7a6f64;
      --accent: #c86a5a;
      --accent-2: #7aa39a;
      --card: #fffdf8;
      --line: #e9dfd3;
      --shadow: 0 14px 32px rgba(55, 45, 35, 0.12);
      --paper: rgba(0, 0, 0, 0.03);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Shippori Mincho", "Noto Serif SC", "Songti SC", "STSong", serif;
      color: var(--ink);
      background:
        radial-gradient(900px 600px at 80% -10%, #fffaf2 0%, #f7efe4 60%, #f2e9dc 100%),
        repeating-linear-gradient(135deg, transparent 0 12px, var(--paper) 12px 13px);
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }
    header {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }
    h1 {
      font-size: 30px;
      margin: 0;
      letter-spacing: 1px;
    }
    .sub {
      color: var(--muted);
      font-size: 15px;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 18px;
      display: grid;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }
    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(220px 160px at 90% 10%, rgba(200, 160, 140, 0.12), transparent 70%),
        radial-gradient(240px 160px at 10% 90%, rgba(140, 180, 170, 0.12), transparent 70%);
      pointer-events: none;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .tag {
      padding: 6px 10px;
      background: #efe7dc;
      border-radius: 999px;
      font-size: 13px;
      color: #6a5a4d;
    }
    .big {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .muted {
      color: var(--muted);
    }
    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 16px;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 6px 18px rgba(200, 75, 49, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 22px rgba(200, 75, 49, 0.3); }
    .btn.secondary {
      background: #e7d6c2;
      color: #4c3f33;
      box-shadow: none;
    }
    .btn.good {
      background: var(--accent-2);
      box-shadow: 0 6px 18px rgba(42, 157, 143, 0.25);
    }
    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }
    .history {
      max-height: 320px;
      overflow: auto;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fffdf8;
    }
    .history ul { margin: 0; padding-left: 18px; }
    .history li { margin: 6px 0; }
    .banner {
      display: none;
      padding: 12px 14px;
      border-radius: 12px;
      background: #fdebe4;
      border: 1px solid #f2c8bb;
      color: #7a3a2f;
      font-weight: 600;
    }
    .banner.show { display: block; }
    .foot {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .notice {
      font-size: 13px;
      color: #7b6a5b;
      background: #f7efe3;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
    }
    @media (max-width: 520px) {
      .big { font-size: 30px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>李昳的吃药提醒</h1>
      <div class="sub">每天中午 12:00 的一份温柔提醒 · 轻点“已吃”即可留下今日记录</div>
    </header>

    <div class="panel">
      <div id="reminder" class="banner">提醒：今天中午的药还没记录，吃完后点一下“已吃”。</div>

      <div class="row">
        <div class="tag" id="todayTag">今天</div>
        <div class="big" id="statusText">尚未记录</div>
      </div>

      <div class="row">
        <button class="btn good" id="markBtn">已吃</button>
        <button class="btn secondary" id="undoBtn">撤销今天记录</button>
        <button class="btn secondary" id="testBtn">测试提醒</button>
      </div>

      <div class="grid">
        <div>
          <div class="muted">今天记录时间</div>
          <div id="timeText">—</div>
        </div>
        <div>
          <div class="muted">连续打卡</div>
          <div id="streakText">0 天</div>
        </div>
        <div>
          <div class="muted">提醒时间</div>
          <div>每天 12:00 · 一天一小步，身体更安心</div>
        </div>
        <div>
          <div class="muted">历史记录（最近 30 天）</div>
          <div class="history" id="historyBox">
            <ul id="historyList"></ul>
          </div>
        </div>
      </div>

      <div class="notice">
        小提示：建议把本页面收藏到微信（或添加到手机桌面）。打开页面后会自动提示，点一下就记下今天的自己。
      </div>
    </div>

    <div class="foot">
      数据仅保存在本机浏览器里，不会上传。
    </div>
  </div>

  <script>
    const STORAGE_KEY = "med_reminder_records_v1";

    function pad(n) { return String(n).padStart(2, "0"); }
    function formatDate(d) {
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }
    function formatTime(d) {
      return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function loadRecords() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (e) {
        return {};
      }
    }
    function saveRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    const statusText = document.getElementById("statusText");
    const timeText = document.getElementById("timeText");
    const historyList = document.getElementById("historyList");
    const streakText = document.getElementById("streakText");
    const reminder = document.getElementById("reminder");

    function dateFromKey(key) {
      const [y, m, d] = key.split("-").map(Number);
      return new Date(y, m - 1, d);
    }
    function addDays(date, n) {
      const d = new Date(date);
      d.setDate(d.getDate() + n);
      return d;
    }
    function calcStreak(records) {
      const keys = Object.keys(records);
      if (keys.length === 0) return 0;
      const set = new Set(keys);
      let streak = 0;
      let cursor = new Date();
      while (true) {
        const key = formatDate(cursor);
        if (set.has(key)) {
          streak += 1;
          cursor = addDays(cursor, -1);
        } else {
          break;
        }
      }
      return streak;
    }

    function updateUI() {
      const records = loadRecords();
      const today = new Date();
      const todayKey = formatDate(today);
      const todayRecord = records[todayKey];

      document.getElementById("todayTag").textContent = `今天 ${todayKey}`;

      if (todayRecord) {
        statusText.textContent = "已记录";
        timeText.textContent = todayRecord.time;
      } else {
        statusText.textContent = "尚未记录";
        timeText.textContent = "—";
      }

      const keys = Object.keys(records).sort().reverse().slice(0, 30);
      historyList.innerHTML = "";
      if (keys.length === 0) {
        const li = document.createElement("li");
        li.textContent = "暂无记录";
        historyList.appendChild(li);
      } else {
        keys.forEach(k => {
          const li = document.createElement("li");
          li.textContent = `${k}  已吃（${records[k].time}）`;
          historyList.appendChild(li);
        });
      }

      const streak = calcStreak(records);
      streakText.textContent = `${streak} 天`;
    }

    function markToday() {
      const records = loadRecords();
      const now = new Date();
      const key = formatDate(now);
      records[key] = { time: formatTime(now) };
      saveRecords(records);
      updateUI();
    }

    function undoToday() {
      const records = loadRecords();
      const key = formatDate(new Date());
      if (records[key]) {
        delete records[key];
        saveRecords(records);
      }
      updateUI();
    }

    function shouldRemindNow() {
      const records = loadRecords();
      const now = new Date();
      const key = formatDate(now);
      if (records[key]) return false;
      const hour = now.getHours();
      const min = now.getMinutes();
      return hour > 12 || (hour === 12 && min >= 0);
    }

    function showReminder() {
      reminder.classList.add("show");
      // 尝试触发震动（部分手机/微信可能不支持）
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }

    function hideReminder() {
      reminder.classList.remove("show");
    }

    function checkReminderLoop() {
      if (shouldRemindNow()) {
        showReminder();
      } else {
        hideReminder();
      }
    }

    document.getElementById("markBtn").addEventListener("click", () => {
      markToday();
      hideReminder();
    });
    document.getElementById("undoBtn").addEventListener("click", () => {
      undoToday();
      checkReminderLoop();
    });
    document.getElementById("testBtn").addEventListener("click", () => {
      showReminder();
      setTimeout(hideReminder, 5000);
    });

    updateUI();
    checkReminderLoop();
    setInterval(() => {
      updateUI();
      checkReminderLoop();
    }, 60 * 1000);
  </script>
</body>
</html>
